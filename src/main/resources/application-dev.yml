spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:dev_db;MODE=MySQL
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  sql:
    init:
      mode: never
  cache:
    type: none
  redis:
    host: localhost
    port: 6379
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    root: INFO
    com.interviewmirror: DEBUG
    org.hibernate.SQL: DEBUG
