services:
  # MySQL 데이터베이스
  mysql:
    image: mysql:8.4
    container_name: interview-mysql
    env_file: .env
    environment:
      TZ: "Asia/Seoul"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - interview-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis 캐시
  redis:
    image: redis:8.0-alpine
    container_name: interview-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - interview-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5

  # Spring Boot 애플리케이션
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interview-backend
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - interview-network
    # volumes:
    #   # 로컬 개발을 위한 마운트 (선택사항)
    #   - ./build/libs:/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  interview-network:
    driver: bridge
